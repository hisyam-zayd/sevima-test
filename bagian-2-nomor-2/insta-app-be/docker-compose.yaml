services:
  app:
    build: .
    image: insta-app-be:latest
    ports:
      - "8000:8000"
    volumes:
      - .:/var/www/html
    environment:
      - APP_KEY="see your .env. generate it automatically with php artisan key:generate"
      - DB_CONNECTION=sqlite
      - DB_DATABASE=/var/www/html/database/database.sqlite
    working_dir: /var/www/html

  # Frontend akan ditambahkan nanti di service terpisah
